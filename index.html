<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Humanwissenschaftliche Abteilung - Universität zu Köln</title>

<style>
body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background-color: #e6e6e6;
}

/* ===== HEADER ===== */
.header {
    background-color: #0b3d6d;
    color: white;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
}

/* Dropdown */
.dropdown {
    position: relative;
    display: inline-block;
}

.dropbtn {
    background: none;
    border: none;
    color: white;
    font-size: 18px;
    cursor: pointer;
    padding: 8px;
}

.dropdown-content {
    display: none;
    position: absolute;
    background-color: white;
    min-width: 200px;
    box-shadow: 0px 4px 8px rgba(0,0,0,0.2);
    margin-top: 10px;
    z-index: 1;
    left: 0;
}

.dropdown-content a {
    color: black;
    padding: 12px 16px;
    text-decoration: none;
    display: block;
}

.dropdown-content a:hover {
    background-color: #f1f1f1;
}

.dropdown.active .dropdown-content {
    display: block;
}

.header-title {
    font-size: 20px;
    font-weight: bold;
}

.header-right img {
    height: 45px;
}

/* ===== CONTENT ===== */
.content {
    background-color: white;
    margin: 40px auto;
    padding: 40px;
    width: 75%;
    border-radius: 4px;
}

h2 {
    color: #0b3d6d;
}

h3 {
    color: #0b3d6d;
}

p {
    line-height: 1.6;
}

/* HWA-Info-Block */
.hwa-info {
    background-color: #f8f9fa;
    padding: 20px;
    border-left: 4px solid #0b3d6d;
    margin: 20px 0;
}

/* Stationen-Abschnitte */
.station {
    margin-top: 60px;
    padding-top: 40px;
    border-top: 1px solid #ccc;
}

.station h2 {
    margin-top: 0;
}

/* Regeln-Liste */
.rules-list {
    list-style: none;
    padding: 0;
}

.rules-list li {
    padding: 8px 0;
    display: flex;
    align-items: center;
}

.rules-list li::before {
    content: "📖";
    margin-right: 10px;
    font-size: 20px;
}

.rules-list li.warning::before {
    content: "⚠️";
}
</style>
</head>
