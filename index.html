<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Humanwissenschaftliche Abteilung - Universität zu Köln</title>

<style>
body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background-color: #e6e6e6;
}

/* Header */
.header {
    background-color: #0b3d6d;
    color: white;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
}

/* Dropdown */
.dropdown {
    position: relative;
    display: inline-block;
}

.dropbtn {
    background: none;
    border: none;
    color: white;
    font-size: 18px;
    cursor: pointer;
    padding: 8px;
}

.dropdown-content {
    display: none;
    position: absolute;
    background-color: white;
    min-width: 200px;
    box-shadow: 0px 4px 8px rgba(0,0,0,0.2);
    margin-top: 10px;
    z-index: 1;
    left: 0;
}

.dropdown-content a {
    color: black;
    padding: 12px 16px;
    text-decoration: none;
    display: block;
}

.dropdown-content a:hover {
    background-color: #f1f1f1;
}

.dropdown.active .dropdown-content {
    display: block;
}

.header-title {
    font-size: 20px;
    font-weight: bold;
}

.header-right img {
    height: 45px;
}

/* Content */
.content {
    background-color: white;
    margin: 40px auto;
    padding: 40px;
    width: 75%;
    border-radius: 4px;
    max-width: 1000px;
}

h2 {
    color: #0b3d6d;
}

h3 {
    color: #0b3d6d;
}

p {
    line-height: 1.6;
}

/* HWA-Info */
.hwa-info {
    background-color: #f8f9fa;
    padding: 20px;
    border-left: 4px solid #0b3d6d;
    margin: 20px 0;
}

/* Stationen */
.station {
    margin-top: 60px;
    padding-top: 40px;
    border-top: 1px solid #ccc;
}

.station h2 {
    margin-top: 0;
}

/* Regeln-Liste (ohne Emojis) */
.rules-list {
    list-style: none;
    padding-left: 0;
}

.rules-list li {
    padding: 8px 0;
    position: relative;
    padding-left: 25px;
}

.rules-list li::before {
    content: "•";
    position: absolute;
    left: 0;
    font-weight: bold;
    color: #0b3d6d;
}
</style>
</head>

<body>

<div class="header">
    <div class="dropdown" id="stationenDropdown">
        <button class="dropbtn" onclick="toggleDropdown()">☰ Stationen</button>
        <div class="dropdown-content">
            <a href="#station1">Lesesaal HWA</a>
            <a href="#station2">Station 2</a>
            <a href="#station3">Station 3</a>
        </div>
    </div>

    <div class="header-title">
        Humanwissenschaftliche Abteilung – Universität zu Köln
    </div>

    <div class="header-right">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/91/Universitaet_zu_Koeln_Logo.jpg/1280px-Universitaet_zu_Koeln_Logo.jpg" alt="Logo Universität zu Köln">
    </div>
</div>

<div class="content">

    <h2>Startseite</h2>

    <h3>Willkommen in der Humanwissenschaftlichen Abteilung der Universität zu Köln.</h3>
